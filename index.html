<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>パーソナルジム REACH STUDIO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gold: #c5a059;
            --dark-charcoal: #333333;
            --soft-beige: #fdfaf7;
            --border-color: #e5dfd9;
        }
        body {
            font-family: 'Noto Sans JP', sans-serif;
            background-color: var(--soft-beige);
            color: var(--dark-charcoal);
            line-height: 1.6;
            margin: 0;
            padding: 0;
        }
        .serif { font-family: 'Noto Serif JP', serif; }
        .fade-in { animation: fadeIn 0.6s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .line-add-btn {
            background-color: #06C755;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 18px 28px;
            border-radius: 4px;
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
            letter-spacing: 0.05em;
            width: 100%;
            box-sizing: border-box;
            transition: opacity 0.2s;
        }
        .line-add-btn:hover { opacity: 0.85; }
    </style>
</head>
<body class="pb-16">

    <header class="bg-white/80 backdrop-blur-md border-b border-[#eeeae5]">
        <div class="max-w-md mx-auto px-6 py-5">
            <h1 class="text-xl font-light tracking-[0.2em] serif text-center">REACH STUDIO</h1>
            <p class="text-[10px] text-center text-gray-400 tracking-widest mt-1">PERSONAL GYM</p>
        </div>
    </header>

    <main class="max-w-md mx-auto px-6 mt-10">

        <div class="text-center mb-10 fade-in">
            <h2 class="serif text-xl mb-3 tracking-wider">挑戦する女性は、美しい。</h2>
            <p class="text-xs text-gray-500 leading-loose">周りではなく、自分に目を向ける時間。</p>
        </div>

        <div class="bg-white border border-[#eeeae5] rounded p-8 text-center fade-in">

            <!-- LINEアイコン -->
            <div style="width:72px; height:72px; background:#06C755; border-radius:50%; display:flex; align-items:center; justify-content:center; margin:0 auto 20px;">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="40" height="40" fill="white">
                    <path d="M24 4C12.95 4 4 11.82 4 21.4c0 5.86 3.27 11.04 8.32 14.37-.36 1.3-1.3 4.72-1.49 5.46-.23.9.33 1.77 1.24 1.77.22 0 .44-.06.64-.18l6.48-3.8c1.56.3 3.17.46 4.81.46 11.05 0 20-7.82 20-17.4S35.05 4 24 4z"/>
                </svg>
            </div>

            <p class="text-base font-medium text-gray-800 mb-3 serif">体験予約はLINEから</p>
            <p class="text-xs text-gray-500 leading-loose mb-8">
                公式LINEを友だち追加すると<br>
                予約・ご連絡がスムーズに行えます。<br>
                まずは下のボタンから友だち追加してください。
            </p>

            <!-- 友だち追加ボタン -->
            <a href="https://lin.ee/stT9PWf" class="line-add-btn">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="24" height="24" fill="white">
                    <path d="M24 4C12.95 4 4 11.82 4 21.4c0 5.86 3.27 11.04 8.32 14.37-.36 1.3-1.3 4.72-1.49 5.46-.23.9.33 1.77 1.24 1.77.22 0 .44-.06.64-.18l6.48-3.8c1.56.3 3.17.46 4.81.46 11.05 0 20-7.82 20-17.4S35.05 4 24 4z"/>
                </svg>
                友だち追加して予約する
            </a>

            <p class="text-[10px] text-gray-400 mt-5 leading-loose">
                追加後、LINEのメニューから<br>体験予約にお進みください
            </p>

        </div>

    </main>

    <footer class="mt-10 mb-10 text-center">
        <div class="h-px w-8 bg-gray-300 mx-auto mb-6"></div>
    </footer>

</body>
</html>
